AWSTemplateFormatVersion: '2010-09-09'
Description: Actividad 1 - Infraestructura web básica con CloudFormation

Parameters:
  EnvironmentType:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Tipo de ambiente para la infraestructura.

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/(16|24)$
    Description: CIDR de la VPC.

  PublicSubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/(24)$
    Description: CIDR de la subnet pública.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Nombre del Key Pair para SSH.

  AllowedIP:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]{1,2})$
    Description: IP permitida para SSH.

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Join [ '-', [ 'VPC', !Ref EnvironmentType, 'Module1' ] ]

  MyInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Join [ '-', [ 'IGW', !Ref EnvironmentType ] ]

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Join [ '-', [ 'Subnet', !Ref EnvironmentType, 'Public' ] ]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: !Join [ '-', [ 'RouteTable', !Ref EnvironmentType ] ]

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref MyInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Join [ '-', [ 'WebServerSG', !Ref EnvironmentType ] ]
      GroupDescription: Security Group para acceso HTTP y SSH.
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIP
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Join [ '-', [ 'WebServerSG', !Ref EnvironmentType ] ]
        - Key: Environment
          Value: !Ref EnvironmentType

  WebServerInstance:
    Type: AWS::EC2::Instance
    DependsOn: AttachGateway
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          dnf update -y
          dnf install -y httpd
          systemctl enable --now httpd
          cat > /var/www/html/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <title>Actividad 1 - CloudFormation</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 560px; margin: 60px auto; padding: 0 20px; color: #333; }
              h1 { font-size: 1.3em; border-bottom: 1px solid #ccc; padding-bottom: 8px; }
              table { width: 100%; border-collapse: collapse; margin-top: 16px; }
              td { padding: 8px 12px; border: 1px solid #ddd; }
              td:first-child { font-weight: bold; background: #f5f5f5; width: 45%; }
            </style>
          </head>
          <body>
            <h1>Actividad 1 - Infraestructura con CloudFormation</h1>
            <table>
              <tr><td>Ambiente</td><td>${EnvironmentType}</td></tr>
              <tr><td>Region</td><td>${AWS::Region}</td></tr>
              <tr><td>VPC CIDR</td><td>${VpcCidr}</td></tr>
              <tr><td>Subnet CIDR</td><td>${PublicSubnetCidr}</td></tr>
              <tr><td>Servidor web</td><td>Apache httpd</td></tr>
            </table>
          </body>
          </html>
          HTMLEOF
          chmod 644 /var/www/html/index.html
          systemctl restart httpd
      Tags:
        - Key: Name
          Value: !Join [ '-', [ 'WebServer', !Ref EnvironmentType ] ]
        - Key: Environment
          Value: !Ref EnvironmentType

Outputs:
  VPCId:
    Description: ID de la VPC creada
    Value: !Ref MyVPC
    Export:
      Name: !Sub '${AWS::StackName}-VPC-ID'

  SubnetId:
    Description: ID de la subnet pública
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub '${AWS::StackName}-Subnet-ID'

  InstancePublicIP:
    Description: IP pública de la instancia EC2
    Value: !GetAtt WebServerInstance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-Instance-Public-IP'

  InstancePublicDNS:
    Description: DNS público de la instancia EC2
    Value: !GetAtt WebServerInstance.PublicDnsName
    Export:
      Name: !Sub '${AWS::StackName}-Instance-Public-DNS'

  WebsiteURL:
    Description: URL del sitio web
    Value: !Sub 'http://${WebServerInstance.PublicDnsName}'
